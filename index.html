<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Wife ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #000000;
            font-family: 'JetBrains+Mono', monospace; overflow: hidden; text-align: center;
        }
        #fireworksCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 35%;
            pointer-events: none; z-index: 1; display: none;
        }
        #typewriter, #successText {
            font-size: 16px; color: #FFFFFF; line-height: 1.8;
            letter-spacing: 1px; min-height: 30px; position: relative; z-index: 2;
        }
        .stage {
            position: relative; width: 320px; height: 120px;
            display: flex; justify-content: space-between; align-items: center;
            opacity: 0; transition: opacity 0.6s ease-in; z-index: 2;
        }
        .btn {
            border: none; color: white; cursor: pointer; font-weight: 500;
            width: 80px; height: 45px; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
        }
        #yesBtn { background-color: #0356C5; }
        #noBtn { background-color: #8B0000; }
        .emoji-wrapper {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; transition: left 0.4s ease-out;
            z-index: 5;
        }
        #mainEmoji { font-size: 50px; }
        #fistEmoji { font-size: 20px; display: none; }
        @keyframes flyAway { to { transform: translate(800px, 50px) rotate(450deg); opacity: 0; } }
        #successScreen { display: none; padding: 20px; width: 90%; max-width: 450px; position: relative; z-index: 2; }
        #finalEmojis { font-size: 25px; margin-top: 25px; opacity: 0; transition: opacity 1.5s ease-in; }
        .cursor { animation: blink 0.7s infinite; color: #FFFFFF; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <audio id="bgMusic" preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="punchSound" src="https://www.soundjay.com/human/sounds/punch-02.mp3" preload="auto"></audio>

    <div id="mainContent">
        <div id="typewriter"></div>
        <div class="stage" id="buttonStage">
            <button id="yesBtn" class="btn" onclick="celebrate()">Yes</button>
            <div class="emoji-wrapper" id="emojiWrap"><span id="mainEmoji">😊</span><span id="fistEmoji">🤜</span></div>
            <button id="noBtn" class="btn" onclick="handlePunch(event)">No</button>
        </div>
    </div>

    <div id="successScreen">
        <div id="successText"></div>
        <div id="finalEmojis">💍 💖 ✨</div>
    </div>

    <script>
        const firstText = "✨ Will you be mine? ✨";
        const secondText = "Thank you for being mine.\nI love you more than words can say,\nmy beautiful wife, \"Pi Si\".";
        let idx1 = 0, idx2 = 0;
        const dpr = window.devicePixelRatio || 1;

        window.onload = () => { typeWriter1(); };

        function typeWriter1() {
            if (idx1 < firstText.length) {
                document.getElementById("typewriter").innerHTML = firstText.substring(0, idx1 + 1) + '<span class="cursor">|</span>';
                idx1++; setTimeout(typeWriter1, 60);
            } else {
                document.querySelector(".cursor").style.display = "none";
                document.getElementById("buttonStage").style.opacity = "1";
            }
        }

        function handlePunch(event) {
            const wrapper = document.getElementById('emojiWrap');
            const mainEmoji = document.getElementById('mainEmoji');
            const fist = document.getElementById('fistEmoji');
            const noBtn = document.getElementById('noBtn');
            const punchSound = document.getElementById('punchSound');
            mainEmoji.innerHTML = "😡"; wrapper.style.left = "75%"; 
            setTimeout(() => {
                fist.style.display = "inline-block"; punchSound.play();
                noBtn.style.animation = "flyAway 0.8s forwards";
                setTimeout(() => { fist.style.display = "none"; mainEmoji.innerHTML = "🙄"; wrapper.style.left = "50%"; }, 400);
            }, 400);
        }

        function celebrate() {
            const music = document.getElementById('bgMusic');
            music.currentTime = 65; music.play();
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
            startFireworks();
            if (idx2 === 0) typeWriter2();
        }

        function typeWriter2() {
            if (idx2 < secondText.length) {
                let char = secondText.charAt(idx2);
                document.getElementById("successText").innerHTML += (char === "\n" ? "<br>" : char);
                idx2++; setTimeout(typeWriter2, 70);
            } else { document.getElementById('finalEmojis').style.opacity = "1"; }
        }

        // --- Slow Motion Optimized Fireworks ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let particles = [];
        const speedMultiplier = 0.65; // အရှိန်ကို 0.65 အထိ လျှော့ချထားခြင်း

        function resizeCanvas() {
            const width = window.innerWidth;
            const height = window.innerHeight * 0.35;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }

        function startFireworks() {
            document.getElementById('fireworksCanvas').style.display = 'block';
            resizeCanvas();
            loop();
        }

        class Firework {
            constructor() {
                const h = window.innerHeight * 0.35;
                this.x = Math.random() * window.innerWidth;
                this.y = h; 
                this.targetY = Math.random() * (h * 0.5);
                this.speed = 2.5 * speedMultiplier; // Launch speed လျှော့ထားခြင်း
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    this.explode();
                    return true;
                }
                return false;
            }
            draw() {
                ctx.fillStyle = "white";
                ctx.fillRect(this.x, this.y, 1.2, 3);
            }
            explode() {
                const colors = ['#FFD700', '#FF8C00', '#FFCC00', '#FFFFFF', '#FFFACD'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                for (let i = 0; i < 60; i++) {
                    particles.push(new Particle(this.x, this.y, color));
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const force = (Math.random() * 4 + 1) * speedMultiplier; // Explosion force လျှော့ထားခြင်း
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.gravity = 0.05 * speedMultiplier; // အောက်ကျတဲ့ အရှိန်ကိုပါ နှေးစေခြင်း
                this.friction = 0.97; // ပိုပြီး ညင်သာသွားအောင် လေထုခုခံအား တိုးမြှင့်ထားခြင်း
                this.alpha = 1;
                this.decay = (Math.random() * 0.01 + 0.008) * speedMultiplier;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                return this.alpha <= 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 0.8, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function loop() {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.globalCompositeOperation = 'lighter';

            if (Math.random() < 0.03) fireworks.push(new Firework());

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].draw();
                if (fireworks[i].update()) fireworks.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].draw();
                if (particles[i].update()) particles.splice(i, 1);
            }

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
