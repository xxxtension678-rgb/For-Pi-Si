<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Wife ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #000000;
            font-family: 'JetBrains+Mono', monospace; overflow: hidden; text-align: center;
        }

        /* GIF Container - စာသားအပေါ်မှာထားမယ် */
        #gifContainer {
            width: 100%;
            max-width: 400px;
            height: 250px;
            display: none; /* "Yes" နှိပ်မှ ပေါ်မယ် */
            margin-bottom: 20px;
            z-index: 1;
        }

        #bgGif {
            width: 100%;
            height: 100%;
            object-fit: contain; /* GIF ပုံမပျက်စေရန် */
        }

        #typewriter, #successText {
            font-size: 16px; color: #FFFFFF; line-height: 1.8;
            letter-spacing: 1px; min-height: 30px;
            position: relative; z-index: 2;
        }

        .stage {
            position: relative; width: 320px; height: 120px;
            display: flex; justify-content: space-between; align-items: center;
            opacity: 0; transition: opacity 0.6s ease-in; z-index: 2;
        }

        .btn {
            border: none; color: white; cursor: pointer; font-weight: 500;
            width: 80px; height: 45px; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #yesBtn { background-color: #0356C5; }
        #noBtn { background-color: #8B0000; }

        .emoji-wrapper {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        #mainEmoji { font-size: 50px; user-select: none; }
        #fistEmoji { font-size: 20px; margin-left: -2px; display: none; }

        @keyframes punchAction {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1) translateX(8px); opacity: 1; }
            100% { transform: scale(1) translateX(4px); opacity: 1; }
        }

        @keyframes flyAway { to { transform: translate(800px, 50px) rotate(450deg); opacity: 0; } }

        #successScreen { display: none; padding: 20px; width: 90%; max-width: 450px; position: relative; z-index: 2; }
        .small-emojis { font-size: 25px; margin-top: 25px; opacity: 0.8; }
        .cursor { animation: blink 0.7s infinite; color: #FFFFFF; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="gifContainer">
        <img id="bgGif" src="fireworks.gif" alt="fireworks">
    </div>

    <audio id="bgMusic" preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <audio id="punchSound" src="https://www.soundjay.com/human/sounds/punch-02.mp3" preload="auto"></audio>

    <div id="mainContent">
        <div id="typewriter"></div>
        <div class="stage" id="buttonStage">
            <button id="yesBtn" class="btn" onclick="celebrate()">Yes</button>
            <div class="emoji-wrapper" id="emojiWrap">
                <span id="mainEmoji">😊</span>
                <span id="fistEmoji">🤜</span>
            </div>
            <button id="noBtn" class="btn" onclick="handlePunch(event)">No</button>
        </div>
    </div>

    <div id="successScreen">
        <div id="successText"></div>
        <div class="small-emojis">💍 💖 ✨</div>
    </div>

    <script>
        const firstText = "✨ Will you be mine? ✨";
        const secondText = "Thank you for being mine.\nI love you more than words can say,\nmy beautiful wife, \"Pi Si\".";
        let idx1 = 0, idx2 = 0;

        window.onload = () => { typeWriter1(); };

        function typeWriter1() {
            if (idx1 < firstText.length) {
                document.getElementById("typewriter").innerHTML = firstText.substring(0, idx1 + 1) + '<span class="cursor">|</span>';
                idx1++;
                setTimeout(typeWriter1, 60);
            } else {
                document.querySelector(".cursor").style.display = "none";
                document.getElementById("buttonStage").style.opacity = "1";
            }
        }

        function handlePunch(event) {
            const wrapper = document.getElementById('emojiWrap');
            const mainEmoji = document.getElementById('mainEmoji');
            const fist = document.getElementById('fistEmoji');
            const noBtn = document.getElementById('noBtn');
            const punchSound = document.getElementById('punchSound');
            mainEmoji.innerHTML = "😡";
            wrapper.style.left = "75%"; 
            setTimeout(() => {
                fist.style.display = "inline-block";
                fist.style.animation = "punchAction 0.2s forwards";
                punchSound.play();
                noBtn.style.animation = "flyAway 0.8s forwards";
                setTimeout(() => {
                    fist.style.display = "none";
                    mainEmoji.innerHTML = "🙄";
                    wrapper.style.left = "50%";
                    setTimeout(() => noBtn.style.display = "none", 800);
                }, 400);
            }, 400);
        }

        function celebrate() {
            const music = document.getElementById('bgMusic');
            const gifContainer = document.getElementById('gifContainer');
            
            music.currentTime = 65; 
            music.play().catch(e => console.log("Music error"));

            // GIF ကို အပေါ်မှာ ပြသခြင်း
            gifContainer.style.display = 'block';

            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
            
            if (idx2 === 0) typeWriter2();
        }

        function typeWriter2() {
            if (idx2 < secondText.length) {
                let char = secondText.charAt(idx2);
                document.getElementById("successText").innerHTML += (char === "\n" ? "<br>" : char);
                idx2++;
                setTimeout(typeWriter2, 60);
            }
        }
    </script>
</body>
</html>
